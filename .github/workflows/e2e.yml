name: E2E smoke tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check E2E_BASE_URL is configured
        id: check-url
        run: |
          if [ -z "$E2E_BASE_URL" ]; then
            echo "E2E_BASE_URL secret is not set — skipping E2E tests."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Playwright Chromium
        if: steps.check-url.outputs.skip == 'false'
        run: pnpm --filter @workspace/west-hills-capital exec playwright install chromium --with-deps

      - name: Run E2E tests
        if: steps.check-url.outputs.skip == 'false'
        run: pnpm --filter @workspace/west-hills-capital test:e2e
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: steps.check-url.outputs.skip == 'false' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/west-hills-capital/e2e/report
          retention-days: 14
