name: Scrub Git History (One-Time Security Fix)

# How to run:
#
# 1. Go to GitHub → Settings → Secrets and variables → Actions → New repository secret
#    and add these five secrets (the OLD values that need to be scrubbed):
#
#      SCRUB_OLD_ENCRYPTION_MASTER_KEY
#      SCRUB_OLD_FEDEX_CLIENT_ID
#      SCRUB_OLD_FEDEX_CLIENT_SECRET
#      SCRUB_OLD_DILLON_GAGE_API_KEY
#      SCRUB_OLD_SESSION_TOKEN
#
# 2. Actions tab → "Scrub Git History (One-Time Security Fix)" → Run workflow
#
# 3. Once the run succeeds, delete the five SCRUB_* secrets from GitHub Settings.
#
# The secret values are never stored in this file — they are injected at runtime
# by GitHub Actions and automatically masked in all log output.

on:
  workflow_dispatch:

jobs:
  scrub:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-filter-repo
        run: pip3 install git-filter-repo

      - name: Build replacements file (values injected from GitHub Secrets — never logged)
        env:
          S1: ${{ secrets.SCRUB_OLD_ENCRYPTION_MASTER_KEY }}
          S2: ${{ secrets.SCRUB_OLD_FEDEX_CLIENT_ID }}
          S3: ${{ secrets.SCRUB_OLD_FEDEX_CLIENT_SECRET }}
          S4: ${{ secrets.SCRUB_OLD_DILLON_GAGE_API_KEY }}
          S5: ${{ secrets.SCRUB_OLD_SESSION_TOKEN }}
        run: |
          printf '%s\n' \
            "${S1}==>REDACTED_ENCRYPTION_MASTER_KEY" \
            "${S2}==>REDACTED_FEDEX_CLIENT_ID" \
            "${S3}==>REDACTED_FEDEX_CLIENT_SECRET" \
            "${S4}==>REDACTED_DILLON_GAGE_API_KEY" \
            "${S5}==>REDACTED_SESSION_TOKEN" \
            > /tmp/replacements.txt
          echo "Replacements file built (5 entries — values masked by GitHub Actions)."

      - name: Rewrite history
        run: git-filter-repo --replace-text /tmp/replacements.txt --force

      - name: Verify — confirm no secrets remain in local history
        env:
          S1: ${{ secrets.SCRUB_OLD_ENCRYPTION_MASTER_KEY }}
          S2: ${{ secrets.SCRUB_OLD_FEDEX_CLIENT_ID }}
          S3: ${{ secrets.SCRUB_OLD_FEDEX_CLIENT_SECRET }}
          S4: ${{ secrets.SCRUB_OLD_DILLON_GAGE_API_KEY }}
          S5: ${{ secrets.SCRUB_OLD_SESSION_TOKEN }}
        run: |
          FOUND=0
          i=0
          for secret in "$S1" "$S2" "$S3" "$S4" "$S5"; do
            i=$((i+1))
            COUNT=$(git log -p --all | grep -cF "$secret" || true)
            echo "  Secret $i: $COUNT occurrence(s) remaining"
            if [ "$COUNT" -gt 0 ]; then FOUND=1; fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "FAIL: One or more secrets still present — aborting push."
            exit 1
          fi
          echo "PASS: All secrets scrubbed from local history."

      - name: Force-push cleaned history to GitHub
        run: |
          # git-filter-repo removes the original remotes as a safety measure.
          # Re-add origin with the Actions token and force-push the rewritten branch.
          git remote add push-target \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push push-target main --force
          echo "Done. Rewritten history pushed to origin/main."
