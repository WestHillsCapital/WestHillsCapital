name: Scrub Git History (One-Time Security Fix)

# Run manually from GitHub → Actions tab → "Scrub Git History" → Run workflow
on:
  workflow_dispatch:

jobs:
  scrub:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-filter-repo
        run: pip3 install git-filter-repo

      - name: Create replacements file
        run: |
          printf '%s\n' \
            '7e5a002b3e0d07026d3b7ee847ead9e4668f820cbd3e4d8f1c7d814510a15391==>REDACTED_ENCRYPTION_MASTER_KEY' \
            'l7b9d07dbde93c4446a649934cb2898d02==>REDACTED_FEDEX_CLIENT_ID' \
            '3cc1d6e0832545d588a79e9ccdfefa32==>REDACTED_FEDEX_CLIENT_SECRET' \
            '1466-5007062a40b28b6449fb749a49379f26==>REDACTED_DILLON_GAGE_API_KEY' \
            'df_3iQhuYil5yYEpI9dkJwzHEyTeWJ-F0qzw6Cg8wE_tZw==>REDACTED_SESSION_TOKEN' \
            > /tmp/replacements.txt
          echo "Replacements file:"
          cat /tmp/replacements.txt

      - name: Rewrite history
        run: git-filter-repo --replace-text /tmp/replacements.txt --force

      - name: Verify — no secrets remain in local history
        run: |
          FOUND=0
          for secret in \
            "7e5a002b3e0d07026d3b7ee847ead9e4668f820cbd3e4d8f1c7d814510a15391" \
            "l7b9d07dbde93c4446a649934cb2898d02" \
            "3cc1d6e0832545d588a79e9ccdfefa32" \
            "1466-5007062a40b28b6449fb749a49379f26" \
            "df_3iQhuYil5yYEpI9dkJwzHEyTeWJ-F0qzw6Cg8wE_tZw"
          do
            COUNT=$(git log -p --all | grep -c "$secret" || true)
            echo "  $secret: $COUNT occurrence(s)"
            if [ "$COUNT" -gt 0 ]; then FOUND=1; fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "ERROR: One or more secrets still present in history!"
            exit 1
          fi
          echo "Verification passed — all secrets scrubbed."

      - name: Force-push cleaned history to GitHub
        run: |
          git remote add cleaned \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push cleaned main --force-with-lease
          echo "Done. History rewritten and pushed."
