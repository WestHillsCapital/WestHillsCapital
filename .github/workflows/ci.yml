name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Typecheck, Audit & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (SDK and libs needed for typecheck)
        run: pnpm --filter @docuplete/sdk --filter './lib/**' --if-present run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Dependency audit (high/critical)
        run: pnpm audit --audit-level=high

      - name: Build artifacts
        run: pnpm -r --filter '!@workspace/mockup-sandbox' --if-present run build

      - name: Frontend unit tests (vitest)
        run: pnpm --filter @workspace/west-hills-capital test

      - name: Frontend coverage report (vitest)
        run: pnpm --filter @workspace/west-hills-capital exec vitest run --coverage --config vitest.config.ts
        continue-on-error: true

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: artifacts/west-hills-capital/coverage
          retention-days: 14
