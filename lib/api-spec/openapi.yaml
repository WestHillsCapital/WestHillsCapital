openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: West Hills Capital API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pricing
    description: Spot prices and product pricing
  - name: scheduling
    description: Appointment scheduling
  - name: leads
    description: Lead capture and intake forms
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pricing/spot:
    get:
      operationId: getSpotPrices
      tags: [pricing]
      summary: Get current spot prices
      description: Returns gold and silver spot prices with last updated timestamp
      responses:
        "200":
          description: Current spot prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotPrices"

  /pricing/products:
    get:
      operationId: getProductPrices
      tags: [pricing]
      summary: Get featured product prices
      description: Returns pricing for the three featured products with spreads applied
      responses:
        "200":
          description: Featured product prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPricesResponse"

  /pricing/buyback:
    get:
      operationId: getBuybackPrices
      tags: [pricing]
      summary: Get buyback prices
      description: Returns estimated buyback prices for featured products
      responses:
        "200":
          description: Buyback prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuybackPricesResponse"

  /scheduling/slots:
    get:
      operationId: getAvailableSlots
      tags: [scheduling]
      summary: Get available appointment slots
      description: Returns available 45-minute allocation call slots over the next 14 days
      responses:
        "200":
          description: Available appointment slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableSlotsResponse"

  /scheduling/book:
    post:
      operationId: bookAppointment
      tags: [scheduling]
      summary: Book an appointment slot
      description: Books a specific appointment slot and stores lead information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookAppointmentRequest"
      responses:
        "200":
          description: Appointment booked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookAppointmentResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/intake:
    post:
      operationId: submitLeadIntake
      tags: [leads]
      summary: Submit lead intake form
      description: Captures lead information from IRA or general intake forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadIntakeRequest"
      responses:
        "200":
          description: Lead submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadIntakeResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SpotPrices:
      type: object
      properties:
        gold:
          type: number
          description: Gold spot price per troy oz in USD
        silver:
          type: number
          description: Silver spot price per troy oz in USD
        lastUpdated:
          type: string
          description: ISO 8601 timestamp of last update
        source:
          type: string
          description: Data source identifier
      required:
        - gold
        - silver
        - lastUpdated
        - source

    ProductPrice:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        metal:
          type: string
          enum: [gold, silver]
        weight:
          type: string
        spotPrice:
          type: number
        spreadPercent:
          type: number
        finalPrice:
          type: number
        iraEligible:
          type: boolean
        deliveryWindow:
          type: string
        imageUrl:
          type: string
        description:
          type: string
      required:
        - id
        - name
        - metal
        - weight
        - spotPrice
        - spreadPercent
        - finalPrice
        - iraEligible
        - deliveryWindow
        - imageUrl
        - description

    ProductPricesResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductPrice"
        lastUpdated:
          type: string
      required:
        - products
        - lastUpdated

    BuybackPrice:
      type: object
      properties:
        productId:
          type: string
        productName:
          type: string
        buybackPrice:
          type: number
        buybackSpreadPercent:
          type: number
      required:
        - productId
        - productName
        - buybackPrice
        - buybackSpreadPercent

    BuybackPricesResponse:
      type: object
      properties:
        prices:
          type: array
          items:
            $ref: "#/components/schemas/BuybackPrice"
        disclaimer:
          type: string
        lastUpdated:
          type: string
      required:
        - prices
        - disclaimer
        - lastUpdated

    AppointmentSlot:
      type: object
      properties:
        id:
          type: string
        dateTime:
          type: string
          description: ISO 8601 datetime string in Central time
        dayLabel:
          type: string
          description: Human readable day (e.g. "Monday, March 25")
        timeLabel:
          type: string
          description: Human readable time (e.g. "10:00 AM CT")
        available:
          type: boolean
      required:
        - id
        - dateTime
        - dayLabel
        - timeLabel
        - available

    AvailableSlotsResponse:
      type: object
      properties:
        slots:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentSlot"
        timezone:
          type: string
      required:
        - slots
        - timezone

    BookAppointmentRequest:
      type: object
      properties:
        slotId:
          type: string
        allocationType:
          type: string
          enum: [physical_delivery, ira_rollover, not_sure]
        allocationRange:
          type: string
          enum: [under_50k, 50k_150k, 150k_500k, 500k_plus]
        timeline:
          type: string
          enum: [ready, within_30_days, researching]
        state:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
      required:
        - slotId
        - allocationType
        - allocationRange
        - timeline
        - state
        - firstName
        - lastName
        - email
        - phone

    BookAppointmentResponse:
      type: object
      properties:
        confirmationId:
          type: string
        scheduledTime:
          type: string
        dayLabel:
          type: string
        timeLabel:
          type: string
        message:
          type: string
      required:
        - confirmationId
        - scheduledTime
        - dayLabel
        - timeLabel
        - message

    LeadIntakeRequest:
      type: object
      properties:
        formType:
          type: string
          enum: [ira, general]
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        state:
          type: string
        allocationType:
          type: string
        allocationRange:
          type: string
        timeline:
          type: string
        currentCustodian:
          type: string
        notes:
          type: string
      required:
        - formType
        - firstName
        - lastName
        - email
        - phone
        - state

    LeadIntakeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
