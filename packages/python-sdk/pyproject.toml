[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "docuplete"
version = "0.1.0"
description = "Official Python SDK for the Docuplete API"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.8"
keywords = ["docuplete", "pdf", "document", "esign", "api"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = [
  "httpx>=0.24.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0",
  "pytest-asyncio>=0.21",
  "mypy>=1.0",
  "respx>=0.20",
]

[project.urls]
Homepage    = "https://docuplete.com"
Docs        = "https://docuplete.com/docuplete-docs/"
Repository  = "https://github.com/docuplete/docuplete-python"

[tool.setuptools.packages.find]
where = ["."]
include = ["docuplete*"]

[tool.mypy]
strict = true
python_version = "3.8"
