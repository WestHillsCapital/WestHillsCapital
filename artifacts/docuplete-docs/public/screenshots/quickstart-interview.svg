<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>
  <rect width="1280" height="800" fill="#080E1A"/>
  
    <!-- white interview background -->
    <rect width="1280" height="800" fill="#f9fafb"/>
    <!-- top bar -->
    <rect x="0" y="0" width="1280" height="60" rx="0" fill="white"/>
    <rect x="0" y="59" width="1280" height="1" fill="#e5e7eb"/>
    <!-- brand logo area -->
    <rect x="540" y="14" width="200" height="32" rx="6" fill="#eff6ff"/>
    <text x="640" y="35" font-size="14" fill="#1d4ed8" font-weight="700" text-anchor="middle">Acme Financial</text>

    <!-- progress bar -->
    <rect x="0" y="60" width="1280" height="6" rx="0" fill="#e5e7eb"/>
    <rect x="0" y="60" width="576" height="6" rx="0" fill="#1B4FD8"/>

    <!-- step indicator -->
    <text x="640" y="96" font-size="12" fill="#6b7280" text-anchor="middle">Step 2 of 5 — Personal Information</text>

    <!-- card -->
    <rect x="320" y="112" width="640" height="580" rx="16" fill="white"/>
    <rect x="320" y="112" width="640" height="580" rx="16" fill="none" stroke="#e5e7eb" stroke-width="1"/>

    <!-- card header -->
    <text x="640" y="158" font-size="20" fill="#111827" font-weight="700" text-anchor="middle">Personal Information</text>
    <text x="640" y="180" font-size="14" fill="#6b7280" text-anchor="middle">Please provide your personal details below.</text>
    <rect x="360" y="196" width="560" height="1" fill="#f3f4f6"/>

    <!-- fields -->
    <text x="360" y="228" font-size="13" fill="#374151" font-weight="600">Full Legal Name *</text>
    <rect x="360" y="236" width="560" height="44" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="376" y="263" font-size="14" fill="#111827">Margaret A. Johnson</text>
    <rect x="360" y="236" width="560" height="44" rx="8" fill="none" stroke="#1B4FD8" stroke-width="2"/>

    <text x="360" y="304" font-size="13" fill="#374151" font-weight="600">Date of Birth *</text>
    <rect x="360" y="312" width="268" height="44" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="376" y="339" font-size="14" fill="#6b7280">MM / DD / YYYY</text>

    <text x="652" y="304" font-size="13" fill="#374151" font-weight="600">SSN / Tax ID *</text>
    <rect x="652" y="312" width="268" height="44" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="668" y="339" font-size="14" fill="#6b7280">XXX-XX-XXXX</text>

    <text x="360" y="380" font-size="13" fill="#374151" font-weight="600">Account Type *</text>
    
    <rect x="360" y="388" width="184" height="48" rx="8" fill="#eff6ff" stroke="#1B4FD8" stroke-width="2"/>
    <circle cx="380" cy="412" r="8" fill="#1B4FD8" stroke="#1B4FD8" stroke-width="2"/>
    <circle cx="380" cy="412" r="4" fill="white"/>
    <text x="400" y="416" font-size="14" fill="#1d4ed8" font-weight="600">Individual</text>
    <rect x="552" y="388" width="184" height="48" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <circle cx="572" cy="412" r="8" fill="white" stroke="#9ca3af" stroke-width="2"/>
    
    <text x="592" y="416" font-size="14" fill="#374151" font-weight="normal">Joint</text>
    <rect x="744" y="388" width="184" height="48" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <circle cx="764" cy="412" r="8" fill="white" stroke="#9ca3af" stroke-width="2"/>
    
    <text x="784" y="416" font-size="14" fill="#374151" font-weight="normal">Trust / Entity</text>

    <!-- continue button -->
    <rect x="360" y="460" width="560" height="52" rx="10" fill="#1B4FD8"/>
    <text x="640" y="491" font-size="15" fill="white" font-weight="600" text-anchor="middle">Continue</text>

    <!-- back link -->
    <text x="640" y="532" font-size="13" fill="#6b7280" text-anchor="middle">← Back to previous step</text>

    <!-- footer -->
    <rect x="0" y="752" width="1280" height="48" fill="white"/>
    <rect x="0" y="751" width="1280" height="1" fill="#e5e7eb"/>
    <text x="640" y="780" font-size="12" fill="#9ca3af" text-anchor="middle">Powered by Docuplete · Secure &amp; encrypted · Questions? Contact support@acmefinancial.com</text>
  
</svg>