<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>
  <rect width="1280" height="800" fill="#080E1A"/>
  
    <rect width="1280" height="800" fill="#f8fafc"/>
    <rect x="0" y="0" width="1280" height="64" rx="0" fill="white"/>
    <rect x="0" y="63" width="1280" height="1" fill="#e2e8f0"/>
    <rect x="560" y="16" width="160" height="32" rx="6" fill="#eff6ff"/>
    <text x="640" y="37" font-size="13" fill="#1d4ed8" font-weight="700" text-anchor="middle">Smith Financial Group</text>

    <rect x="0" y="64" width="1280" height="4" rx="0" fill="#e2e8f0"/>
    <rect x="0" y="64" width="1152" height="4" rx="0" fill="#1B4FD8"/>
    <text x="640" y="92" font-size="12" fill="#64748b" text-anchor="middle">Step 5 of 5 — Signature</text>

    <!-- identity verified banner -->
    <rect x="340" y="104" width="600" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="640" y="129" font-size="13" fill="#15803d" font-weight="600" text-anchor="middle">✓ Identity verified  —  margaret.j@email.com</text>

    <!-- card -->
    <rect x="340" y="156" width="600" height="520" rx="16" fill="white"/>
    <rect x="340" y="156" width="600" height="520" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1"/>

    <text x="640" y="204" font-size="20" fill="#0f172a" font-weight="700" text-anchor="middle">Electronic Signature</text>
    <text x="640" y="226" font-size="14" fill="#64748b" text-anchor="middle">Review the agreement then sign below.</text>
    <rect x="380" y="242" width="520" height="1" fill="#f1f5f9"/>

    <!-- agreement excerpt -->
    <rect x="380" y="252" width="520" height="60" rx="8" fill="#f8fafc"/>
    <text x="396" y="272" font-size="11" fill="#6b7280">By signing below, I confirm that I have read, understand, and agree to the Investment</text>
    <text x="396" y="288" font-size="11" fill="#6b7280">Advisory Agreement, including all disclosures, fee schedules, and risk acknowledgments.</text>
    <text x="396" y="304" font-size="11" fill="#64748b" font-style="italic">Margaret A. Johnson — May 3, 2026</text>

    <!-- signature tabs -->
    <rect x="380" y="324" width="256" height="36" rx="8" fill="#1B4FD8"/>
    <rect x="644" y="324" width="256" height="36" rx="8" fill="#f1f5f9" stroke="#d1d5db" stroke-width="1"/>
    <text x="508" y="347" font-size="13" fill="white" font-weight="600" text-anchor="middle">✍ Draw</text>
    <text x="772" y="347" font-size="13" fill="#6b7280" text-anchor="middle">Aa Type</text>

    <!-- signature canvas -->
    <rect x="380" y="368" width="520" height="148" rx="8" fill="#fafbff" stroke="#1B4FD8" stroke-width="1.5"/>
    <!-- drawn signature -->
    <path d="M440 455 Q490 415 540 445 Q590 475 640 440 Q690 405 760 450 Q800 470 840 440" stroke="#1d4ed8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="640" y="500" font-size="10" fill="#94a3b8" text-anchor="middle">Draw your signature above</text>
    <text x="840" y="508" font-size="11" fill="#3b82f6" text-anchor="end">Clear</text>

    <!-- submit -->
    <rect x="380" y="528" width="520" height="52" rx="10" fill="#1B4FD8"/>
    <text x="640" y="559" font-size="15" fill="white" font-weight="600" text-anchor="middle">Submit &amp; Sign →</text>

    <rect x="0" y="756" width="1280" height="44" rx="0" fill="white"/>
    <rect x="0" y="755" width="1280" height="1" fill="#e2e8f0"/>
    <text x="640" y="783" font-size="12" fill="#94a3b8" text-anchor="middle">Powered by Docuplete · Signature is legally binding under ESIGN Act</text>
  
</svg>