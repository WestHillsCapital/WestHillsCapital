kind = "web"
previewPath = "/docuplete-docs/"
title = "Docuplete Docs"
version = "1.0.0"
id = "artifacts/docuplete-docs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/docuplete-docs/" ]
localPort = 22173

[services.development]
run = "pnpm --filter @workspace/docuplete-docs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docuplete-docs", "run", "build" ]
publicDir = "artifacts/docuplete-docs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22173"
BASE_PATH = "/docuplete-docs/"
