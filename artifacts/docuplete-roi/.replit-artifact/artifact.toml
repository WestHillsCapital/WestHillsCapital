kind = "web"
previewPath = "/docuplete-roi/"
title = "Docuplete ROI Calculator"
version = "1.0.0"
id = "artifacts/docuplete-roi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/docuplete-roi/" ]
localPort = 21429

[services.development]
run = "pnpm --filter @workspace/docuplete-roi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docuplete-roi", "run", "build" ]
publicDir = "artifacts/docuplete-roi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21429"
BASE_PATH = "/docuplete-roi/"
