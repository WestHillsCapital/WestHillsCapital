kind = "web"
previewPath = "/"
title = "West Hills Capital"
version = "1.0.0"
id = "artifacts/west-hills-capital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23904

[services.development]
run = "pnpm --filter @workspace/west-hills-capital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/west-hills-capital", "run", "build" ]
publicDir = "artifacts/west-hills-capital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23904"
BASE_PATH = "/"
