kind = "video"
previewPath = "/docuplete-explainer/"
title = "Docuplete Explainer Video"
version = "1.0.0"
id = "artifacts/docuplete-explainer"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/docuplete-explainer/" ]
localPort = 25438

[services.development]
run = "pnpm --filter @workspace/docuplete-explainer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docuplete-explainer", "run", "build" ]
publicDir = "artifacts/docuplete-explainer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25438"
BASE_PATH = "/docuplete-explainer/"
